<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP Builder — VRSteel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai','Segoe UI',Tahoma,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;font-size:16px}
input,textarea,select,button{font-family:'IBM Plex Sans Thai','Segoe UI',Tahoma,sans-serif}
::placeholder{font-family:'IBM Plex Sans Thai','Segoe UI',Tahoma,sans-serif}
.app{max-width:680px;margin:0 auto;padding:16px 16px 80px}

/* Header */
.hdr{background:linear-gradient(135deg,#1a2b4a,#2d4a7a);color:white;padding:18px 22px;border-radius:16px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.hdr-logo{font-size:2rem}
.hdr h1{font-size:1.15rem;font-weight:800}
.hdr p{font-size:.82rem;opacity:.75;margin-top:2px}

/* Progress dots */
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all .3s}
.dot.done{background:#22c55e}
.dot.active{background:#2563eb;width:28px;border-radius:5px}

/* Card */
.card{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:12px}
.card-title{font-size:1.1rem;font-weight:800;color:#1a2b4a;margin-bottom:4px}
.card-sub{font-size:.86rem;color:#64748b;margin-bottom:20px;line-height:1.5}

/* Department grid */
.dept-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dept-btn{background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.dept-btn:active{transform:scale(.97)}
.dept-btn.sel{border-color:#2563eb;background:#eff6ff;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.dept-btn .di{font-size:2.2rem;margin-bottom:8px}
.dept-btn .dn{font-size:.82rem;font-weight:700;color:#1e40af}

/* Process list */
.proc-list{display:flex;flex-direction:column;gap:10px}
.proc-btn{background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .2s;-webkit-tap-highlight-color:transparent;text-align:left}
.proc-btn:active{transform:scale(.98)}
.proc-btn.sel{border-color:#2563eb;background:#eff6ff}
.proc-btn .pi{font-size:1.8rem;flex-shrink:0}
.proc-btn .pt{font-size:.98rem;font-weight:700;color:#1a2b4a}
.proc-btn .pd{font-size:.8rem;color:#64748b;margin-top:2px}

/* Form fields */
.field{margin-bottom:16px}
.field label{display:block;font-size:.86rem;font-weight:700;color:#374151;margin-bottom:8px}
.field input,.field textarea,.field select{width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:.96rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fafafa;color:#1e293b}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#2563eb;background:white}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}

/* Steps viewer */
.step-cards{display:flex;flex-direction:column;gap:10px}
.step-card{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px}
.step-card-top{display:flex;align-items:flex-start;gap:12px}
.step-badge{background:#1a2b4a;color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;flex-shrink:0;margin-top:1px}
.step-action{font-size:.92rem;font-weight:600;color:#1a2b4a;line-height:1.4;flex:1}
.step-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-left:44px}
.chip{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;border-radius:20px;padding:3px 10px;font-size:.75rem;font-weight:600}
.chip.role{background:#fdf4ff;color:#7e22ce;border-color:#e9d5ff}
.chip.tool{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.chip.dec{background:#fffbeb;color:#92400e;border-color:#fde68a}
.step-actions{display:flex;gap:6px;margin-top:10px;padding-left:44px}
.sbtn{border:none;border-radius:7px;padding:7px 14px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.sbtn-edit{background:#eff6ff;color:#1e40af}
.sbtn-del{background:#fee2e2;color:#dc2626}
.sbtn-edit:hover{background:#dbeafe}
.sbtn-del:hover{background:#fecaca}

/* Add step button */
.add-step-btn{border:2px dashed #93c5fd;background:#f0f9ff;color:#0369a1;border-radius:12px;padding:14px;width:100%;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:all .15s}
.add-step-btn:hover{background:#e0f2fe}

/* Issues */
.issue-card{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:10px}
.issue-prob{font-size:.88rem;font-weight:700;color:#92400e;margin-bottom:4px}
.issue-sol{font-size:.84rem;color:#78350f;line-height:1.5}
.issue-actions{display:flex;gap:6px;margin-top:8px}

/* Nav buttons */
.nav{display:flex;gap:10px;margin-top:20px}
.nav-back{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px 22px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;flex:0}
.nav-next{background:#1a2b4a;color:white;border:none;border-radius:12px;padding:14px;font-size:.96rem;font-weight:800;cursor:pointer;font-family:inherit;flex:1;transition:all .2s}
.nav-next:hover{background:#253d6a}
.nav-next:active{transform:scale(.98)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.modal-title{font-size:1rem;font-weight:800;color:#1a2b4a;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #f1f5f9}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-cancel{flex:1;background:#f1f5f9;border:none;border-radius:10px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}
.modal-save{flex:2;background:#1a2b4a;color:white;border:none;border-radius:10px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}

/* Output/Done */
.done-banner{background:linear-gradient(135deg,#065f46,#047857);color:white;border-radius:14px;padding:20px;text-align:center;margin-bottom:16px}
.done-banner .db-icon{font-size:2.5rem;margin-bottom:8px}
.done-banner h2{font-size:1.1rem;font-weight:800}
.done-banner p{font-size:.84rem;opacity:.85;margin-top:4px}
.action-row{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.action-btn{border:none;border-radius:12px;padding:16px;font-size:.96rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.action-btn:active{transform:scale(.98)}
.ab-save{background:#1a2b4a;color:white}
.ab-print{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.ab-quiz{background:#eff6ff;color:#1e40af;border:1.5px solid #bfdbfe}

/* SOP preview */
.sop-preview{background:white;border:1.5px solid #e2e8f0;border-radius:12px;padding:20px;font-size:.85rem;line-height:1.6}
.sop-preview h1{font-size:1.05rem;color:#1a2b4a;border-bottom:2px solid #1a2b4a;padding-bottom:8px;margin-bottom:14px}
.sop-preview h2{font-size:.88rem;font-weight:800;color:#1e40af;background:#eff6ff;padding:5px 10px;border-radius:5px;margin-top:16px;margin-bottom:8px;border-left:3px solid #2563eb}
.sop-preview table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:6px}
.sop-preview th{background:#1a2b4a;color:white;padding:7px 8px;text-align:left}
.sop-preview td{border:1px solid #e2e8f0;padding:7px 8px;vertical-align:top}
.sop-preview tr:nth-child(even) td{background:#f8fafc}
.ttag{display:inline-block;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:20px;padding:2px 8px;font-size:.75rem;margin:2px}

/* Quiz */
.quiz-wrap{background:white;border-radius:12px;padding:20px;margin-top:12px}
.qcard{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:12px}
.qnum{font-size:.72rem;color:#94a3b8;margin-bottom:4px}
.qtext{font-weight:700;color:#1a2b4a;margin-bottom:10px;font-size:.9rem;line-height:1.4}
.qopt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:1.5px solid #e2e8f0;background:white;margin-bottom:6px;font-size:.86rem;color:#374151;transition:all .15s}
.qopt:hover{background:#eff6ff;border-color:#93c5fd}
.qopt.correct{background:#dcfce7!important;border-color:#16a34a!important;color:#15803d;font-weight:700}
.qopt.wrong{background:#fee2e2!important;border-color:#dc2626!important;color:#dc2626}
.submit-quiz-btn{width:100%;background:#1a2b4a;color:white;border:none;border-radius:10px;padding:14px;font-size:.96rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:12px}
.score-box{text-align:center;padding:24px;background:#f0fdf4;border-radius:12px;border:2px solid #22c55e;margin-top:16px}
.score-big{font-size:3rem;font-weight:900;color:#15803d;line-height:1}

@media print{.hdr,.dots,.nav,.action-row,.quiz-wrap{display:none!important}.sop-preview{border:none;padding:0}}
</style>

    <div class="field"><label>🔀 เงื่อนไขพิเศษ (ถ้ามี)</label><input type="text" id="m-decision" placeholder="เช่น ถ้าวงเงินเกิน 50,000 บาท ต้องขออนุมัติก่อน"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="modal-save" onclick="saveStep()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- Edit issue modal -->
<div class="modal-bg" id="issueModal">
  <div class="modal">
    <div class="modal-title">แก้ไขปัญหา</div>
    <div class="field"><label>ปัญหาที่เจอ</label><input type="text" id="m-prob" placeholder="เช่น ระบบ Bplus ไม่บันทึก"></div>
    <div class="field"><label>วิธีแก้ไข</label><textarea id="m-sol" rows="3" placeholder="เช่น ลองล็อกเอ้าท์แล้วล็อกอินใหม่ ถ้ายังไม่ได้แจ้ง IT"></textarea></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeIssueModal()">ยกเลิก</button>
      <button class="modal-save" onclick="saveIssue()">💾 บันทึก</button>
    </div>
  </div>
</div>

        </div>`).join('')}

      <button class="nav-next" onclick="next1()">ถัดไป →</button>

function selProc(id){
  const procs = TPL[S.dept]||[];
  S.tpl = procs.find(p=>p.id===id)||null;
  render();
}

function next1(){
  if(!S.tpl){alert('กรุณาเลือก Process ก่อน');return;}
  // Load template data
  if(!S.tpl.custom){
    S.processName = S.tpl.name;
    S.owner = S.tpl.owner||'';
    S.purpose = S.tpl.purpose||'';
    S.scope = S.tpl.scope||'';
    S.trigger = S.tpl.trigger||'';
    S.roles = S.tpl.roles ? S.tpl.roles.map(r=>({...r})) : [];
    S.tools = S.tpl.tools ? [...S.tpl.tools] : [];
    S.steps = S.tpl.steps ? S.tpl.steps.map(s=>({...s})) : [];
    S.issues = S.tpl.issues ? S.tpl.issues.map(i=>({...i})) : [];
  } else {
    S.processName=''; S.owner=''; S.purpose=''; S.scope=''; S.trigger='';
    S.roles=[{role:'',description:''}]; S.tools=['Bplus ERP',''];
    S.steps=[{action:'',role:'',tool:'',input:'',output:'',decision:''}];
    S.issues=[{problem:'',solution:''}];

}

function s3(){
  const roles=getMasterRoles(), tools=getMasterTools();
  const roleOpts = ['<option value="">-- เลือก --</option>',
    ...roles.map(r=>`<option>${esc(r)}</option>`)].join('');
  const toolOpts = ['<option value="">-- เลือก --</option>',
    ...tools.map(t=>`<option>${esc(t)}</option>`)].join('');

  const stepCards = S.steps.map((st,i)=>`
    <div class="step-card">
      <div class="step-card-top">
        <div class="step-badge">${i+1}</div>
        <div class="step-action">${esc(st.action)||'<span style="color:#94a3b8;font-weight:400">ยังไม่ได้กรอกการดำเนินการ</span>'}</div>
      </div>
      <div class="step-meta">
        ${st.role?`<span class="chip role">👤 ${esc(st.role)}</span>`:''}
        ${st.tool?`<span class="chip tool">🔧 ${esc(st.tool)}</span>`:''}
        ${st.output?`<span class="chip">📤 ${esc(st.output)}</span>`:''}
        ${st.decision?`<span class="chip dec">🔀 ${esc(st.decision)}</span>`:''}
      </div>
      <div class="step-actions">
        <button class="sbtn sbtn-edit" onclick="editStep(${i})">✏️ แก้ไข</button>

    <div class="card-title">📋 ขั้นตอนการทำงาน</div>

    <button class="add-step-btn" onclick="addStep()">+ เพิ่มขั้นตอน</button>
    <div class="nav">
      <button class="nav-back" onclick="back()">←</button>
      <button class="nav-next" onclick="S.screen=4;render()">ถัดไป →</button>
    </div>
  </div>`;

function getMasterRoles(){
  if(_masterRolesCache) return _masterRolesCache;
  return DEFAULT_ROLES.slice();
}
function getMasterTools(){
  if(_masterToolsCache) return _masterToolsCache;
  return DEFAULT_TOOLS.slice();
}

function editStep(i){
  S.editingStep=i;
  const st=S.steps[i];
  const roles=getMasterRoles();
  const tools=getMasterTools();
  const roleOpts=['<option value="">-- เลือก --</option>',...roles.map(r=>`<option ${r===st.role?'selected':''}>${esc(r)}</option>`)].join('');
  const toolOpts=['<option value="">-- เลือก --</option>',...tools.map(t=>`<option ${t===st.tool?'selected':''}>${esc(t)}</option>`)].join('');
  document.getElementById('modalTitle').textContent='แก้ไขขั้นตอนที่ '+(i+1);
  document.getElementById('m-action').value=st.action||'';
  document.getElementById('m-role').innerHTML=roleOpts;
  document.getElementById('m-tool').innerHTML=toolOpts;
  document.getElementById('m-output').value=st.output||'';
  document.getElementById('m-decision').value=st.decision||'';
  document.getElementById('stepModal').classList.add('open');
}

function addStep(){
  S.steps.push({action:'',role:S.roles[0]?.role||'',tool:S.tools[0]||'',input:'',output:'',decision:''});
  editStep(S.steps.length-1);
}

function delStep(i){ if(confirm('ลบขั้นตอนนี้?')){S.steps.splice(i,1);render();} }

function closeModal(){ document.getElementById('stepModal').classList.remove('open'); }
function saveStep(){
  const i=S.editingStep;
  S.steps[i]={
    action:document.getElementById('m-action').value,
    role:document.getElementById('m-role').value,
    tool:document.getElementById('m-tool').value,
    input:S.steps[i].input||'',
    output:document.getElementById('m-output').value,
    decision:document.getElementById('m-decision').value,
  };
  closeModal();
  render();
}

function editIssue(i){
  S.editingIssue=i;
  document.getElementById('m-prob').value=S.issues[i].problem||'';
  document.getElementById('m-sol').value=S.issues[i].solution||'';
  document.getElementById('issueModal').classList.add('open');
}
function addIssue(){ S.issues.push({problem:'',solution:''}); editIssue(S.issues.length-1); }

function closeIssueModal(){ document.getElementById('issueModal').classList.remove('open'); }
function saveIssue(){
  S.issues[S.editingIssue]={problem:document.getElementById('m-prob').value,solution:document.getElementById('m-sol').value};

}

function buildSOPHTML(dept){

  const steps=S.steps.filter(s=>s.action);
  const issues=S.issues.filter(i=>i.problem);
  const tools=S.tools.filter(t=>t);
  const roles=S.roles.filter(r=>r.role);
  let h='';
  h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
    <div><div style="font-size:.75rem;color:#64748b">${esc(deptLabel)}</div><h1>${esc(S.processName)}</h1></div>
    <div style="font-size:.78rem;color:#64748b;text-align:right;line-height:1.8">
      <div>เจ้าของ: ${esc(S.owner)}</div><div>v${esc(S.version)}</div><div>ทบทวน: ${esc(S.reviewFrequency)}</div>
    </div></div>`;
  if(S.purpose) h+=`<h2>1. วัตถุประสงค์</h2><p>${esc(S.purpose)}</p>`;
  if(S.trigger) h+=`<h2>2. เมื่อไหร่ใช้ SOP นี้</h2><p>${esc(S.trigger)}</p>`;
  if(roles.length) h+=`<h2>3. ผู้เกี่ยวข้อง</h2><table><tr><th>ตำแหน่ง</th><th>หน้าที่</th></tr>${roles.map(r=>`<tr><td><b>${esc(r.role)}</b></td><td>${esc(r.description)}</td></tr>`).join('')}</table>`;
  if(tools.length) h+=`<h2>4. เครื่องมือ</h2><p>${tools.map(t=>`<span class="ttag">${esc(t)}</span>`).join('')}</p>`;
  if(steps.length) h+=`<h2>5. ขั้นตอน</h2><table><tr><th>#</th><th>การดำเนินการ</th><th>ผู้รับผิดชอบ</th><th>เครื่องมือ</th><th>Output</th></tr>${steps.map((s,i)=>`<tr><td style="text-align:center;font-weight:800">${i+1}</td><td>${esc(s.action)}${s.decision?`<br><small style="color:#b45309">🔀 ${esc(s.decision)}</small>`:''}</td><td>${esc(s.role)||'-'}</td><td>${esc(s.tool)||'-'}</td><td>${esc(s.output)||'-'}</td></tr>`).join('')}</table>`;
  if(issues.length) h+=`<h2>6. ปัญหาที่พบบ่อย</h2><table><tr><th>ปัญหา</th><th>วิธีแก้ไข</th></tr>${issues.map(i=>`<tr><td>${esc(i.problem)}</td><td>${esc(i.solution)}</td></tr>`).join('')}</table>`;
  return h;
}

// ===== QUIZ =====
let _qs=[],_ans={},_done=false;
function showQuiz(){
  _qs=makeQuiz(); _ans={}; _done=false;
  if(!_qs.length){document.getElementById('quizArea').innerHTML='<div style="text-align:center;padding:20px;color:#64748b">กรอกข้อมูลขั้นตอนเพิ่มเติมเพื่อสร้าง Quiz</div>';return;}
  const html=`<div class="quiz-wrap">
    <div style="font-weight:800;color:#1a2b4a;margin-bottom:14px;font-size:1rem">🧠 Quiz — ${esc(S.processName)}</div>
    ${_qs.map((q,qi)=>`
      <div class="qcard">
        <div class="qnum">ข้อ ${qi+1}/${_qs.length}</div>
        <div class="qtext">${esc(q.q)}</div>
        ${q.opts.map((o,oi)=>`<div class="qopt" id="o-${qi}-${oi}" onclick="pickQ(${qi},'${String(o).replace(/'/g,"\\'").replace(/\n/g,' ')}',${oi},${q.opts.length})">
          <input type="radio" name="q${qi}"> <span>${esc(String(o))}</span>
        </div>`).join('')}
      </div>`).join('')}
    <button class="submit-quiz-btn" onclick="subQuiz()">✅ ส่งคำตอบ</button>
    <div id="qResult"></div>
  </div>`;
  document.getElementById('quizArea').innerHTML=html;
  document.getElementById('quizArea').scrollIntoView({behavior:'smooth'});
}

function makeQuiz(){
  const qs=[];
  const steps=S.steps.filter(s=>s.action);
  const issues=S.issues.filter(i=>i.problem&&i.solution);
  function sh(a){return[...a].sort(()=>Math.random()-.5)}
  function p4(c,pool,f){var w=sh([...pool,...f]).filter(x=>String(x)!==String(c)).slice(0,3);return sh([c,...w])}
  if(S.purpose) qs.push({q:`SOP "${S.processName}" ทำขึ้นเพื่ออะไร?`,c:S.purpose.substring(0,80),opts:p4(S.purpose.substring(0,80),[],['เพื่อลดต้นทุน','เพื่อเพิ่มยอดขาย','เพื่อปรับโครงสร้างองค์กร'])});
  if(S.trigger) qs.push({q:`เมื่อไหร่ถึงจะต้องเริ่มใช้ SOP นี้?`,c:S.trigger,opts:p4(S.trigger,[],['เมื่อสิ้นเดือน','เมื่อมีการประชุม','เมื่อผู้บริหารสั่ง'])});
  if(steps.length>=2) qs.push({q:`ขั้นตอนแรกของ "${S.processName}" คืออะไร?`,c:steps[0].action,opts:p4(steps[0].action,steps.slice(1).map(s=>s.action),['รอการอนุมัติ','ส่งรายงาน'])});
  const sr=steps.filter(s=>s.role);
  if(sr.length&&S.roles.filter(r=>r.role).length>=2) qs.push({q:`ใครรับผิดชอบขั้นตอน "${sr[0].action}"?`,c:sr[0].role,opts:p4(sr[0].role,S.roles.map(r=>r.role),['CEO','IT Support'])});
  if(steps.length>1) qs.push({q:`"${S.processName}" มีขั้นตอนทั้งหมดกี่ขั้นตอน?`,c:steps.length,opts:sh([...new Set([steps.length,steps.length+1,Math.max(1,steps.length-1),steps.length+2])].slice(0,4))});
  if(issues.length) qs.push({q:`เมื่อเกิดปัญหา "${issues[0].problem}" ควรทำอย่างไร?`,c:issues[0].solution,opts:p4(issues[0].solution,issues.slice(1).map(i=>i.solution),['รอให้หัวหน้าแก้','ปิดระบบและรีสตาร์ท'])});
  return qs.slice(0,6);
}

function pickQ(qi,ans,oi,total){
  if(_done)return;
  _ans[qi]=String(ans);
  for(var i=0;i<total;i++){var el=document.getElementById('o-'+qi+'-'+i);if(el)el.style.background=i===oi?'#dbeafe':'';}
}
function subQuiz(){
  if(_done)return;_done=true;
  var ok=0;
  _qs.forEach(function(q,qi){
    var ua=_ans[qi],ca=String(q.c),cor=ua===ca;
    if(cor)ok++;
    q.opts.forEach(function(opt,oi){
      var el=document.getElementById('o-'+qi+'-'+oi);if(!el)return;
      if(String(opt)===ca)el.classList.add('correct');
      else if(String(opt)===ua&&!cor)el.classList.add('wrong');
    });
  });
  var pct=Math.round(ok/_qs.length*100);
  document.getElementById('qResult').innerHTML=`<div class="score-box"><div style="font-size:3rem">${pct>=80?'🎉':pct>=60?'👍':'📚'}</div><div class="score-big">${ok}/${_qs.length} (${pct}%)</div><div style="color:#374151;margin-top:8px">${pct>=80?'ยอดเยี่ยม!':pct>=60?'ผ่านเกณฑ์ ทบทวนบางส่วนเพิ่ม':'ควรศึกษา SOP อีกครั้ง'}</div></div>`;
}

// ===== SAVE TO LIBRARY (Supabase) =====
async function saveToLibrary(e){
  const dept=DEPTS.find(d=>d.id===S.dept);
  const sopData={
    department:S.dept,departmentName:dept?.name||'',departmentIcon:dept?.icon||'📋',
    processName:S.processName,processOwner:S.owner,version:S.version,
    effectiveDate:S.effectiveDate,reviewFrequency:S.reviewFrequency,
    purpose:S.purpose,scope:S.scope,trigger:S.trigger,
    roles:S.roles,tools:S.tools,steps:S.steps,issues:S.issues,
    relatedDocs:S.relatedDocs,exportedAt:new Date().toISOString(),
  };
  const btn=document.getElementById('btnSaveLib');
  const orig=btn?btn.textContent:'';
  try{
    if(btn){btn.textContent='⏳ กำลังบันทึก...';btn.disabled=true;}
    // Fetch current sops array, update, save back
    var res=await sb.from('app_data').select('value').eq('key','sops').maybeSingle();
    var sops=res.data&&Array.isArray(res.data.value)?res.data.value:[];
    var idx=sops.findIndex(function(s){return s.processName===sopData.processName&&s.department===sopData.department;});
    if(idx>=0)sops[idx]=sopData; else sops.push(sopData);
    var upsertRes=await sb.from('app_data').upsert({key:'sops',value:sops,updated_at:new Date().toISOString()});
    if(upsertRes.error)throw upsertRes.error;
    if(btn){btn.textContent='✅ บันทึกแล้ว!';btn.style.background='#047857';btn.disabled=false;
      setTimeout(()=>{btn.textContent=orig;btn.style.background='';},2500);}
  }catch(err){
    if(btn){btn.textContent='❌ บันทึกไม่สำเร็จ';btn.style.background='#dc2626';btn.disabled=false;
      setTimeout(()=>{btn.textContent=orig;btn.style.background='';},3000);}
    alert('เกิดข้อผิดพลาด: '+err.message);
  }
}

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
